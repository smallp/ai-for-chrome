<!DOCTYPE html>
<html>

<head>
  <title>URL HTML Fetcher</title>
  <style>
    body {
      width: 320px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .section {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #eee;
    }

    .section:last-child {
      border-bottom: none;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      font-size: 13px;
    }

    input {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      width: 100%;
      padding: 10px;
      cursor: pointer;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
    }

    button:hover {
      background-color: #0056b3;
    }

    button:disabled {
      background-color: #ccc;
    }

    #wsStatus {
      margin-top: 5px;
      font-size: 12px;
      font-weight: bold;
    }

    .status-disconnected {
      color: #dc3545;
    }

    .status-connecting {
      color: #ffc107;
    }

    .status-connected {
      color: #28a745;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      word-break: break-all;
    }

    #result {
      margin-top: 10px;
      width: 100%;
      height: 120px;
      display: none;
      font-family: monospace;
      font-size: 11px;
    }
  </style>
</head>

<body>
  <div class="section">
    <label for="wsInput">WebSocket Server URL</label>
    <input type="text" id="wsInput" placeholder="ws://localhost:8080" value="ws://localhost:8080">
    <button id="wsConnectBtn">Connect WebSocket</button>
    <!-- <button id="test">test</button> -->
    <div id="wsStatus" class="status-disconnected">Disconnected</div>
  </div>

  <div class="section">
    <label>Task Logs</label>
    <div id="status">Waiting for tasks via WebSocket...</div>
    <textarea id="result" readonly></textarea>
  </div>

  <script src="popup.js"></script>
</body>

</html>
